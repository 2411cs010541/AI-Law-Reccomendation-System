<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analyze Case</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="dashboard.html">

⚖ AI Law

</a>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center">

AI Case Analysis

</h2>

<label class="mt-3">

Describe Your Problem

</label>

<textarea id="caseText" class="form-control" rows="8"
placeholder="Example: My employer has not paid my salary for three months..."></textarea>

<button class="btn btn-primary mt-3" onclick="analyzeCase()">

Analyze Case

</button>

<hr>

<h4>Recommendation</h4>

<div id="result">

No analysis yet.

</div>

</div>

</div>

<script>

function analyzeCase(){

let text=document.getElementById("caseText").value.toLowerCase();

let output="";

if(text.includes("salary")){

output="<b>Possible Law:</b><br>Labour Law / Payment of Wages Act.";

}

else if(text.includes("theft")){

output="<b>Possible Law:</b><br>Theft-related provisions under criminal law.";

}

else if(text.includes("divorce")){

output="<b>Possible Law:</b><br>Family Law.";

}

else if(text.includes("accident")){

output="<b>Possible Law:</b><br>Motor Vehicle related laws.";

}

else{

output="No matching recommendation found. Please consult a lawyer.";

}

document.getElementById("result").innerHTML=output;

}

</script>

</body>

</html>
